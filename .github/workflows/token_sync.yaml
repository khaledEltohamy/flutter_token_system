name: Token Sync

on:
  push:
    paths:
      - 'token_pipeline/**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: token_pipeline/package-lock.json
      
      - name: Install & Build Tokens
        working-directory: token_pipeline
        run: |
          npm install
          npm run build

      - name: Commit tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "update tokens" || echo "no changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          - name: Commit & Push tokens

permissions:
  contents: write