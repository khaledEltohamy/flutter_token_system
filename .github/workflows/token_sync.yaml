name: Token Sync

on:
  push:
    paths:
      - 'token_pipeline/**'
      - 'tokens.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd token_pipeline
          npm install

      - name: Generate Dart Tokens
        run: |
          node token_pipeline/build.js

      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update design tokens (global + alias)"
          branch: main
          file_pattern: |
            packages/tokens/lib/global/global_tokens.dart
            packages/tokens/lib/alias/alias_tokens.dart
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
