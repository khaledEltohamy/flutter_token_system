name: Token Sync

on:
  push:
    paths:
      - 'token_pipeline/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # ✅ يمنع infinite loop لما CI يعمل commit
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: token_pipeline/package-lock.json

      # 3️⃣ Install & Build tokens
      - name: Install & Build Tokens
        working-directory: token_pipeline
        run: |
          npm install
          npm run build

      # 4️⃣ Commit & Push (branch بدل main)
      - name: Commit & Push tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          # ✅ commit فقط لو فيه تغييرات
          git diff --cached --quiet || git commit -m "chore(tokens): sync from figma"

          # ✅ create branch
          BRANCH="tokens/update-${{ github.run_id }}"
          git checkout -b $BRANCH

          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git $BRANCH

      # # 5️⃣ Create Pull Request
